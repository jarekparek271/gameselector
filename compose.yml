services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://gamepicker:gamepicker@db:5432/gamepicker
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=gamepicker
      - POSTGRES_PASSWORD=gamepicker
      - POSTGRES_DB=gamepicker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamepicker"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
