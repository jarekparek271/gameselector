services:

  db:
    image: postgres:16-alpine
    container_name: game-picker-db
    environment:
      POSTGRES_DB:       gamepicker
      POSTGRES_USER:     gamepicker
      POSTGRES_PASSWORD: gamepicker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamepicker"]
      interval: 5s
      timeout: 5s
      retries: 10


  ollama:
    image: ollama/ollama:latest
    container_name: game-picker-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment if you have an NVIDIA GPU + nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build: ./backend
    container_name: game-picker-backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      DATABASE_URL: postgresql://gamepicker:gamepicker@db:5432/gamepicker
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: game-picker-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
