<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Game Picker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff9d;
    --accent2: #ff2d78;
    --accent3: #7b5ea7;
    --text: #e0e0f0;
    --muted: #6b6b8a;
    --card-bg: #13131f;
    --glow: 0 0 20px rgba(0,255,157,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-tag {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(52px, 9vw, 96px);
    letter-spacing: 4px;
    line-height: 0.9;
    background: linear-gradient(135deg, var(--accent) 0%, #00c8ff 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,255,157,0.3));
  }

  .subtitle {
    margin-top: 16px;
    color: var(--muted);
    font-size: 15px;
    letter-spacing: 1px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; padding: 10px 20px; cursor: pointer; color: var(--muted); border: none; background: transparent; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Input section */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 28px;
    margin-bottom: 32px;
    position: relative;
  }

  .input-section::before {
    content: '// DESCRIBE YOUR GAME';
    position: absolute;
    top: -11px;
    left: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: var(--surface);
    padding: 0 8px;
    letter-spacing: 2px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    background: transparent;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,157,0.05);
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 600;
    padding: 16px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  textarea::placeholder { color: var(--muted); font-weight: 400; }

  .btn-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }

  button#findBtn {
    font-family: 'Bebas Neue', cursive;
    font-size: 20px;
    letter-spacing: 3px;
    padding: 12px 36px;
    background: var(--accent);
    color: #000;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  button#findBtn:hover:not(:disabled) {
    background: #fff;
    box-shadow: 0 0 30px rgba(0,255,157,0.5);
    transform: translateY(-1px);
  }

  button#findBtn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: var(--muted);
  }

  /* Status */
  #status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent3);
    text-align: center;
    min-height: 20px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  #status.error { color: var(--accent2); }

  /* Loading bar */
  .loading-bar {
    height: 2px;
    background: var(--border);
    margin-bottom: 24px;
    overflow: hidden;
    display: none;
  }

  .loading-bar.active { display: block; }

  .loading-bar::after {
    content: '';
    display: block;
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: slide 1.2s ease-in-out infinite;
  }

  @keyframes slide {
    0% { transform: translateX(-200%); }
    100% { transform: translateX(350%); }
  }

  /* Results */
  #results { display: none; }
  #results.visible { display: block; }

  .results-header {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .results-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .games-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .game-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0 20px;
    align-items: start;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.4s forwards;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .game-card:hover {
    border-color: var(--accent);
    box-shadow: var(--glow), inset 0 0 40px rgba(0,255,157,0.02);
  }

  .game-card:nth-child(1) { animation-delay: 0.05s; border-left-color: var(--accent); }
  .game-card:nth-child(2) { animation-delay: 0.12s; border-left-color: #00c8ff; }
  .game-card:nth-child(3) { animation-delay: 0.19s; border-left-color: var(--accent3); }
  .game-card:nth-child(4) { animation-delay: 0.26s; border-left-color: var(--accent2); }
  .game-card:nth-child(5) { animation-delay: 0.33s; border-left-color: #f7b731; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .game-num {
    font-family: 'Bebas Neue', cursive;
    font-size: 38px;
    line-height: 1;
    color: var(--border);
    user-select: none;
    min-width: 40px;
  }

  .game-info { min-width: 0; }

  .game-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .game-why {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.5;
    font-weight: 400;
  }

  .game-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    min-width: 90px;
  }

  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border: 1px solid;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .tag.genre { border-color: var(--accent3); color: var(--accent3); }
  .tag.platform { border-color: var(--border); color: var(--muted); }

  /* backend status indicators */
  .status-bar{display:flex;align-items:center;gap:16px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:24px;justify-content:flex-end;flex-wrap:wrap;}
  .indicator{display:flex;align-items:center;gap:6px;}

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }

  .dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot.offline { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

  /* catalog tab */
  .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  select { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 6px 12px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--accent); }
  .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .catalog-card { background: var(--card-bg); border: 1px solid var(--border); padding: 16px; transition: border-color 0.2s; }
  .catalog-card:hover { border-color: var(--accent3); }
  .cat-title { font-family: 'Bebas Neue', cursive; font-size: 20px; letter-spacing: 1px; margin-bottom: 4px; }
  .cat-meta { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
  .cat-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .cat-tag { font-family: 'Share Tech Mono', monospace; font-size: 9px; padding: 2px 6px; border: 1px solid var(--border); color: var(--muted); }
  #catalogStatus { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); text-align: center; padding: 40px 0; }

  /* history tab */
  .history-item { background: var(--card-bg); border: 1px solid var(--border); border-left: 2px solid var(--accent3); padding: 14px 18px; margin-bottom: 10px; }
  .history-query { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .history-games { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
  .history-time { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--border); margin-top: 6px; }
  #historyStatus { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); text-align: center; padding: 40px 0; }
  
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-tag">&#9670; AI-POWERED &#9670;</div>
    <h1>GAME<br>PICKER</h1>
    <p class="subtitle">// tell me what you feel like playing</p>
  </header>

  <div class="status-bar">
    <div class="indicator"><span class="dot" id="dotOllama"></span><span id="lblOllama">CHECKING AI...</span></div>
    <div class="indicator"><span class="dot" id="dotDB"></span><span id="lblDB">CHECKING DB...</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('recommend')">RECOMMEND</button>
    <button class="tab" onclick="switchTab('catalog')">CATALOG</button>
    <button class="tab" onclick="switchTab('history')">HISTORY</button>
  </div>

  <!-- RECOMMEND tab -->
  <div id="tab-recommend" class="tab-panel active">
    
    <div class="input-section">
      <div class="chips" id="chips">
        <button class="chip" onclick="setChip('relaxing open world game to chill out')">CHILL OPEN WORLD</button>
        <button class="chip" onclick="setChip('fast-paced competitive shooter with progression')">COMPETITIVE SHOOTER</button>
        <button class="chip" onclick="setChip('deep story-driven RPG with moral choices')">STORY RPG</button>
        <button class="chip" onclick="setChip('cozy game I can play with one hand')">COZY & CASUAL</button>
        <button class="chip" onclick="setChip('scary horror game that is genuinely terrifying')">HORROR</button>
        <button class="chip" onclick="setChip('strategy game with complex resource management')">STRATEGY</button>
      </div>
      <textarea id="input" placeholder="e.g. I want something with a great story, dark atmosphere, choices that matter, and RPG mechanics..." rows="4"></textarea>
      <div class="btn-row">
        <button id="findBtn" onclick="findGames()">FIND GAMES &#10140;</button>
      </div>
    </div>

    <div id="status"></div>
    <div class="loading-bar" id="loadingBar"></div>

    <div id="results">
      <div class="results-header">RECOMMENDATIONS</div>
      <div class="games-grid" id="gamesList"></div>
    </div>
  </div>

  <!-- CATALOG tab -->
  <div id="tab-catalog" class="tab-panel">
    <div class="filters">
      <select id="filterGenre" onchange="loadCatalog()">
        <option value="">ALL GENRES</option>
      </select>
      <select id="filterTag" onchange="loadCatalog()">
        <option value="">ALL TAGS</option>
      </select>
    </div>
    <div id="catalogStatus">Loading catalog...</div>
    <div class="catalog-grid" id="catalogGrid"></div>
  </div>

  <!-- HISTORY tab -->
  <div id="tab-history" class="tab-panel">
    <div id="historyStatus">Loading history...</div>
    <div id="historyList"></div>
  </div>

</div>

<script>
  const API = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
    ? 'http://localhost:8000'
    : '/api';

  function escHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe.toString()
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      const data = await r.json();
      setDot('dotOllama', 'lblOllama', data.ollama, 'AI CONNECTED', 'AI OFFLINE');
      setDot('dotDB', 'lblDB', data.db, 'DB CONNECTED', 'DB OFFLINE');
    } catch {
      setDot('dotOllama', 'lblOllama', false, '', 'BACKEND OFFLINE');
      setDot('dotDB', 'lblDB', false, '', 'BACKEND OFFLINE');
    }
  }

  function setDot(dotId, lblId, ok, onTxt, offTxt) {
    document.getElementById(dotId).className = 'dot ' + (ok ? 'online' : 'offline');
    document.getElementById(lblId).textContent = ok ? onTxt : offTxt;
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      const names = ['recommend', 'catalog', 'history'];
      t.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'catalog') initCatalog();
    if (name === 'history') loadHistory();
  }

  function setChip(text) {
    document.getElementById('input').value = text;
    document.getElementById('input').focus();
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
  }

  function setLoading(on) {
    document.getElementById('loadingBar').className = on ? 'loading-bar active' : 'loading-bar';
    document.getElementById('findBtn').disabled = on;
  }

  async function findGames() {
    const description = document.getElementById('input').value.trim();
    if (!description) { setStatus('&#9888; Enter a description first', true); return; }

    setLoading(true);
    setStatus('> Querying AI model...');
    document.getElementById('results').className = '';
    document.getElementById('gamesList').innerHTML = '';

    try {
      const r = await fetch(`${API}/recommend`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description }),
      });

      const text = await r.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (parseErr) {
        throw new Error(`Server returned invalid JSON: "${text.substring(0, 100)}"`);
      }

      if (!r.ok) {
        throw new Error(data.detail || 'Unknown error');
      }

      setStatus(`> Found ${data.games.length} games`);
      renderGames(data.games);

    } catch (err) {
      setStatus(`&#10006; ${err.message}`, true);
    } finally {
      setLoading(false);
    }
  }

  function renderGames(games) {
    const list = document.getElementById('gamesList');
    list.innerHTML = '';

    games.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.innerHTML = `
        <div class="game-num">0${i + 1}</div>
        <div class="game-info">
          <div class="game-title">${escHtml(g.title)}</div>
          <div class="game-why">${escHtml(g.why)}</div>
        </div>
        <div class="game-meta">
          <span class="tag genre">${escHtml(g.genre)}</span>
          <span class="tag platform">${escHtml(g.platform)}</span>
        </div>
      `;
      list.appendChild(card);
    });
    document.getElementById('results').className = 'visible';
  }

  let catalogReady = false;

  async function initCatalog() {
    if (catalogReady) { loadCatalog(); return; }
    const [genres, tags] = await Promise.all([
      fetch(`${API}/genres`).then(r => r.json()).catch(() => []),
      fetch(`${API}/tags`).then(r => r.json()).catch(() => [])
    ]);
    const gs = document.getElementById('filterGenre');
    genres.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g.toUpperCase(); gs.appendChild(o); });
    const ts = document.getElementById('filterTag');
    tags.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t.toUpperCase(); ts.appendChild(o); });
    catalogReady = true;
    loadCatalog();
  }

  async function loadCatalog() {
    const genre = document.getElementById('filterGenre').value;
    const tag = document.getElementById('filterTag').value;
    document.getElementById('catalogStatus').textContent = 'Loading...';
    document.getElementById('catalogGrid').innerHTML = '';
    const params = new URLSearchParams();
    if (genre) params.set('genre', genre);
    if (tag) params.set('tag', tag);
    try {
      const games = await fetch(`${API}/games?${params}`).then(r => r.json());
      document.getElementById('catalogStatus').textContent = '';
      if (!games.length) { document.getElementById('catalogStatus').textContent = 'No games found.'; return; }
      const grid = document.getElementById('catalogGrid');
      games.forEach(g => {
        const c = document.createElement('div');
        c.className = 'catalog-card';
        c.innerHTML = `
          <div class="cat-title">${escHtml(g.title)}</div>
          <div class="cat-meta">
            <span>${escHtml(g.genre)}</span>
            <span>${escHtml(g.platform)}</span>
            ${g.release_year ? `<span>${g.release_year}</span>` : ''}
          </div>
          ${g.description ? `<div class="cat-desc">${escHtml(g.description)}</div>` : ''}
          <div class="cat-tags">${(g.tags || []).map(t => `<span class="cat-tag">${escHtml(t)}</span>`).join('')}</div>`;
        grid.appendChild(c);
      });
    } catch (e) {
      document.getElementById('catalogStatus').textContent = 'Failed to load catalog.';
    }
  }

  async function loadHistory() {
    document.getElementById('historyStatus').textContent = 'Loading...';
    document.getElementById('historyList').innerHTML = '';
    try {
      const rows = await fetch(`${API}/history?limit=30`).then(r => r.json());
      document.getElementById('historyStatus').textContent = '';
      if (!rows.length) { document.getElementById('historyStatus').textContent = 'No searches yet.'; return; }
      const list = document.getElementById('historyList');
      rows.forEach(row => {
        const d = document.createElement('div');
        d.className = 'history-item';
        const time = new Date(row.searched_at).toLocaleString();
        d.innerHTML = `
          <div class="history-query">${escHtml(row.query)}</div>
          <div class="history-games">${(row.result_titles || []).join(' | ')}</div>
          <div class="history-time">${time}</div>`;
        list.appendChild(d);
      });
    } catch {
      document.getElementById('historyStatus').textContent = 'Failed to load history.';
    }
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) findGames();
  });

  checkHealth();
  setInterval(checkHealth, 30000);

</script>
</body>
</html>
